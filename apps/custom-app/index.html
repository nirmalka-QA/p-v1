<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSS layer order (base < mantine < unlayered) — see CLAUDE.md. -->
    <style>@layer base, mantine;</style>
    <title>WISPR — AI-SDLC Platform</title>
    <!-- Runtime env config. Loads before the app bundle so window.__APP_CONFIG__
         is set when environments.ts reads it. Token-replaced per-environment at
         release time; the compiled bundle is never touched. -->
    <script src="/config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
