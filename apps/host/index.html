<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Establish CSS layer order at document parse time: "base" (the universal
         reset) below "mantine" (Mantine components) below unlayered (our module
         styles). Declared here so it is immune to bundler/minifier CSS reordering
         under Module Federation — see CLAUDE.md. -->
    <style>@layer base, mantine;</style>
    <title>WISPR — AI-SDLC Platform</title>
    <!-- Runtime env config (window.__APP_CONFIG__); token-replaced per environment
         at release time. Loads before the bundle so environments.ts can read it. -->
    <script src="/config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
